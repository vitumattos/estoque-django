{% extends 'core/base.html' %}
{% load static %}
{% load crispy_forms_tags %}


{% block main %}
<div class="row ">
    <div class="col-md-5 m-auto py-2 border rounded">
        <h3>Registrar</h3>
        <p>Cadastrar novo usuario</p>
        <hr>
        <form method="post">
            {% csrf_token %}

            {{ form|crispy }}

            <button type="submit" class="btn btn-primary mt-3">Registar</button>
        </form>

    </div>
</div>

{% endblock %}
